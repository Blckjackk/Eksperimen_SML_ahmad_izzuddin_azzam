name: CI Workflow - MLflow Retrain & Docker Hub

on:
  push:
    paths:
      - 'Workflow-CI/**'
  workflow_dispatch:

jobs:
  retrain-and-dockerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub scikit-learn pandas numpy matplotlib seaborn

      - name: Run MLflow Project (Retrain Model)
        run: |
          cd Workflow-CI/MLProject
          mlflow run . --env-manager local

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: Workflow-CI/MLProject/run_id.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image using MLflow
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          RUN_ID=$(cat Workflow-CI/MLProject/run_id.txt)
          DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/obesity-ml-model:latest"
          
          echo "Building Docker image for Run ID: $RUN_ID"
          
          # Gunakan MLflow Build-Docker
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "$DOCKER_IMAGE"
          
          # Push ke Docker Hub
          docker push "$DOCKER_IMAGE"

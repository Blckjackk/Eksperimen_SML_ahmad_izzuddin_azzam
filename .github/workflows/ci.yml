name: CI Workflow - MLflow Retrain & Docker Hub

on:
  push:
    paths:
      - 'Workflow-CI/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  retrain-and-dockerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub scikit-learn pandas numpy matplotlib seaborn

      - name: Run MLflow Project (Retrain Model)
        run: |
          cd Workflow-CI/MLProject
          mlflow run . --env-manager local

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: Workflow-CI/MLProject/run_id.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image using MLflow
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Notice: DOCKERHUB_USERNAME secret is not configured in GitHub Repository Secrets."
            echo "Building Docker image locally to verify..."
            mlflow models build-docker -m "Workflow-CI/MLProject/local_model" -n "obesity-ml-model:latest"
          else
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/obesity-ml-model:latest"
            echo "Building Docker image from local model..."
            
            # Build Docker langsung dari folder local_model
            mlflow models build-docker -m "Workflow-CI/MLProject/local_model" -n "$DOCKER_IMAGE"
            
            echo "Pushing Docker image to Docker Hub..."
            docker push "$DOCKER_IMAGE"
          fi
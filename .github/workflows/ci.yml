name: CI Workflow - MLflow Retrain & Docker Hub

on:
  push:
    paths:
      - 'Workflow-CI/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  retrain-and-dockerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub scikit-learn pandas numpy matplotlib seaborn

      - name: Run MLflow Project (Retrain Model)
        env:
          MLFLOW_TRACKING_USERNAME: "Blckjackk"
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd Workflow-CI/MLProject
          mlflow run . --env-manager local

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: Workflow-CI/MLProject/run_id.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image using MLflow
        continue-on-error: true
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/Blckjackk/Eksperimen_SML_ahmad_izzuddin_azzam.mlflow"
          MLFLOW_TRACKING_USERNAME: "Blckjackk"
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          RUN_ID=$(cat Workflow-CI/MLProject/run_id.txt)
          
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/obesity-ml-model:latest"
          else
            DOCKER_IMAGE="obesity-ml-model:latest"
          fi
          
          echo "Building Docker image for Run ID: $RUN_ID..."
          
          if [ -d "Workflow-CI/MLProject/local_model" ]; then
            mlflow models build-docker -m "Workflow-CI/MLProject/local_model" -n "$DOCKER_IMAGE"
          else
            mlflow models build-docker -m "runs:/$RUN_ID/model" -n "$DOCKER_IMAGE"
          fi
          
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "Pushing Docker image to Docker Hub..."
            docker push "$DOCKER_IMAGE"
          fi